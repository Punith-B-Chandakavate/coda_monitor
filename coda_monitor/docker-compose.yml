version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: coda_monitor_db
    environment:
      POSTGRES_DB: coda_monitor
      POSTGRES_USER: coda_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  web:
    build: .
    container_name: coda_monitor_web
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=coda_monitor.settings_production
      - DB_NAME=coda_monitor
      - DB_USER=coda_user
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - CODA_API_TOKEN=${CODA_API_TOKEN}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
    depends_on:
      - db
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  postgres_data: